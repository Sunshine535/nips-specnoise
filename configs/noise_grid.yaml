# SpecNoise - Structured Noise Injection Grid Search Configuration
# Model: Qwen/Qwen3.5-9B on 8x A100-80GB

model:
  name_or_path: "Qwen/Qwen3.5-9B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

noise_search:
  noise_types:
    - "gaussian"
    - "svd_structured"
    - "low_rank"

  scales: [0.001, 0.005, 0.01, 0.02, 0.05, 0.1]

  layer_groups:
    early: [0, 1, 2, 3, 4, 5, 6, 7]
    middle: [16, 17, 18, 19, 20, 21, 22, 23]
    late: [32, 33, 34, 35, 36, 37, 38, 39]
    all: null   # null means all layers

  low_rank:
    ranks: [1, 4, 8, 16]

  svd_structured:
    top_k_singular: [1, 4, 8, 16]
    direction: "random"   # random | gradient | activation

  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

evaluation:
  mmlu_subjects:
    - abstract_algebra
    - anatomy
    - astronomy
    - college_biology
    - college_chemistry
    - college_computer_science
    - college_mathematics
    - college_physics
    - computer_security
    - electrical_engineering
    - machine_learning
    - formal_logic
    - high_school_european_history
    - high_school_us_history
    - jurisprudence
    - philosophy
    - econometrics
    - high_school_geography
    - high_school_macroeconomics
    - high_school_psychology
    - sociology
    - business_ethics
    - clinical_knowledge
    - medical_genetics
    - professional_medicine
    - virology
  max_samples_per_subject: 100
  batch_size: 8
  max_new_tokens: 16

noise_guided_sft:
  dataset: "openai/gsm8k"
  num_epochs: 2
  per_device_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  warmup_ratio: 0.05
  noise_regularization_weight: 0.1
  max_length: 1024

output:
  base_dir: "./results/noise_search"
